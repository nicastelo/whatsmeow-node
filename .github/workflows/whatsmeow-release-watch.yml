name: Watch Whatsmeow Releases

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch-whatsmeow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Detect newer whatsmeow version
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          current="$(go list -m -f '{{.Version}}' go.mau.fi/whatsmeow)"
          latest="$(go list -m -u -f '{{if .Update}}{{.Update.Version}}{{end}}' go.mau.fi/whatsmeow)"

          if [ -n "$latest" ] && [ "$latest" != "$current" ]; then
            has_update=true
          else
            has_update=false
            latest="$current"
          fi

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "has_update=$has_update" >> "$GITHUB_OUTPUT"

      - name: Analyze update impact (parity + API changes)
        if: steps.detect.outputs.has_update == 'true'
        id: analyze
        shell: bash
        run: |
          set -euo pipefail

          extract_client_methods() {
            go doc go.mau.fi/whatsmeow Client \
              | sed -nE 's/^[[:space:]]*func \([^)]*\*Client\) /func /p' \
              | LC_ALL=C sort -u
          }

          extract_client_methods > current-client-methods.txt

          go get go.mau.fi/whatsmeow@"${{ steps.detect.outputs.latest }}"
          go mod tidy

          extract_client_methods > latest-client-methods.txt

          comm -13 current-client-methods.txt latest-client-methods.txt > added-sigs.txt
          comm -23 current-client-methods.txt latest-client-methods.txt > removed-sigs.txt

          sed -E 's/^func ([^(]+)\(.*/\1/' added-sigs.txt | LC_ALL=C sort -u > added-names.txt
          sed -E 's/^func ([^(]+)\(.*/\1/' removed-sigs.txt | LC_ALL=C sort -u > removed-names.txt
          comm -12 added-names.txt removed-names.txt > changed-names.txt

          added_count=$(wc -l < added-sigs.txt | tr -d ' ')
          removed_count=$(wc -l < removed-sigs.txt | tr -d ' ')
          changed_count=$(wc -l < changed-names.txt | tr -d ' ')

          if [ "$removed_count" -gt 0 ] || [ "$changed_count" -gt 0 ]; then
            breaking=true
          else
            breaking=false
          fi

          set +e
          parity_output="$(go run ./scripts/check-client-parity 2>&1)"
          parity_exit=$?
          set -e
          printf '%s\n' "$parity_output" > parity-output.txt

          if [ "$parity_exit" -eq 0 ]; then
            parity_status=pass
          else
            parity_status=fail
          fi

          {
            echo "## Client API Diff"
            echo
            echo "- Added signatures: $added_count"
            echo "- Removed signatures: $removed_count"
            echo "- Signature-changed methods: $changed_count"
            echo "- Potential breaking change: $breaking"
            echo
            echo "### Added Signatures"
            if [ "$added_count" -gt 0 ]; then
              sed 's/^/- `&`/' added-sigs.txt
            else
              echo "- None"
            fi
            echo
            echo "### Removed Signatures"
            if [ "$removed_count" -gt 0 ]; then
              sed 's/^/- `&`/' removed-sigs.txt
            else
              echo "- None"
            fi
            echo
            echo "### Signature-Changed Methods"
            if [ "$changed_count" -gt 0 ]; then
              sed 's/^/- `&`/' changed-names.txt
            else
              echo "- None"
            fi
          } > api-change-summary.md

          echo "parity_status=$parity_status" >> "$GITHUB_OUTPUT"
          echo "breaking=$breaking" >> "$GITHUB_OUTPUT"

      - name: Build Go binary with new whatsmeow
        if: steps.detect.outputs.has_update == 'true'
        run: go build -o whatsmeow-node ./cmd/whatsmeow-node
        id: build
        continue-on-error: true

      - uses: actions/setup-node@v4
        if: steps.build.outcome == 'success'
        with:
          node-version: "22"

      - name: Install TS dependencies
        if: steps.build.outcome == 'success'
        run: cd ts && npm install --ignore-scripts

      - name: Run E2E tests against new version
        if: steps.build.outcome == 'success'
        id: e2e
        continue-on-error: true
        env:
          E2E_SESSION_KEY: ${{ secrets.E2E_SESSION_KEY }}
        run: |
          if [ -z "$E2E_SESSION_KEY" ] || [ ! -f .e2e-session.db.enc ]; then
            echo "e2e_status=skipped" >> "$GITHUB_OUTPUT"
            echo "E2E skipped: session not configured"
            exit 0
          fi
          openssl enc -aes-256-cbc -d -pbkdf2 \
            -in .e2e-session.db.enc -out ts/e2e-session.db \
            -pass "pass:$E2E_SESSION_KEY"
          cd ts
          E2E_BINARY_PATH="$GITHUB_WORKSPACE/whatsmeow-node" \
          E2E_SESSION_DB="$GITHUB_WORKSPACE/ts/e2e-session.db" \
          npm run test:e2e 2>&1 | tee ../e2e-output.txt
          echo "e2e_status=pass" >> "$GITHUB_OUTPUT"

      - name: Record E2E failure
        if: steps.e2e.outcome == 'failure'
        run: echo "e2e_status=fail" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        if: steps.detect.outputs.has_update == 'true'
        uses: actions/github-script@v7
        env:
          CURRENT: ${{ steps.detect.outputs.current }}
          LATEST: ${{ steps.detect.outputs.latest }}
          PARITY_STATUS: ${{ steps.analyze.outputs.parity_status }}
          BREAKING: ${{ steps.analyze.outputs.breaking }}
          BUILD_STATUS: ${{ steps.build.outcome }}
          E2E_STATUS: ${{ steps.e2e.outputs.e2e_status || 'skipped' }}
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const current = process.env.CURRENT;
            const latest = process.env.LATEST;
            const parityStatus = process.env.PARITY_STATUS || 'fail';
            const breaking = process.env.BREAKING || 'false';
            const buildStatus = process.env.BUILD_STATUS || 'skipped';
            const e2eStatus = process.env.E2E_STATUS || 'skipped';
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const upstreamOwner = 'tulir';
            const upstreamRepoName = 'whatsmeow';
            const upstreamRepo = 'https://github.com/tulir/whatsmeow';
            const changelogUrl = `${upstreamRepo}/releases`;
            const title = `[watch] whatsmeow update available: ${current} -> ${latest}`;

            const toRef = (version) => {
              const pseudo = /^v\d+\.\d+\.\d+-\d{14}-([0-9a-f]{12})$/;
              const match = version.match(pseudo);
              return match ? match[1] : version;
            };
            const currentRef = toRef(current);
            const latestRef = toRef(latest);
            const compareUrl = `${upstreamRepo}/compare/${currentRef}...${latestRef}`;
            const latestVersionUrl = `https://pkg.go.dev/go.mau.fi/whatsmeow@${latest}`;
            const latestSourceUrl = `${upstreamRepo}/tree/${latestRef}`;
            const truncate = (text, max) => {
              if (!text) return '';
              return text.length > max ? `${text.slice(0, max)}\n\n...[truncated]...` : text;
            };

            let parityOutput = 'No parity output captured.';
            if (fs.existsSync('parity-output.txt')) {
              parityOutput = fs.readFileSync('parity-output.txt', 'utf8').trim();
            }

            let e2eOutput = 'No E2E output captured.';
            if (fs.existsSync('e2e-output.txt')) {
              e2eOutput = fs.readFileSync('e2e-output.txt', 'utf8').trim();
            }

            let apiSummary = 'No API change summary captured.';
            if (fs.existsSync('api-change-summary.md')) {
              apiSummary = fs.readFileSync('api-change-summary.md', 'utf8').trim();
            }

            let releaseNotes = '';
            let releaseTitle = '';
            let releaseUrl = '';
            try {
              const releases = await github.rest.repos.listReleases({
                owner: upstreamOwner,
                repo: upstreamRepoName,
                per_page: 100,
              });
              const matched = releases.data.find((rel) => rel.tag_name === latestRef);
              if (matched) {
                releaseTitle = matched.name || matched.tag_name;
                releaseUrl = matched.html_url;
                releaseNotes = truncate(matched.body || '', 6000);
              }
            } catch (err) {
              core.warning(`Failed to fetch releases: ${String(err)}`);
            }

            let compareSummary = '';
            try {
              const compare = await github.rest.repos.compareCommits({
                owner: upstreamOwner,
                repo: upstreamRepoName,
                basehead: `${currentRef}...${latestRef}`,
              });
              const commits = compare.data.commits || [];
              const commitLines = commits
                .slice(0, 30)
                .map((c) => `- ${c.sha.slice(0, 12)} ${c.commit.message.split('\n')[0]}`);
              const hidden = commits.length - commitLines.length;
              if (hidden > 0) {
                commitLines.push(`- ...and ${hidden} more commits`);
              }
              compareSummary = [
                `Files changed: ${compare.data.files?.length ?? 0}`,
                `Total commits: ${commits.length}`,
                '',
                ...commitLines,
              ].join('\n');
            } catch (err) {
              core.warning(`Failed to fetch compare summary: ${String(err)}`);
            }

            const body = [
              'A new `go.mau.fi/whatsmeow` version is available.',
              '',
              `- Current: \`${current}\``,
              `- Latest: \`${latest}\``,
              `- Latest version link: ${latestVersionUrl}`,
              `- Latest source link: ${latestSourceUrl}`,
              `- Changelog / releases: ${changelogUrl}`,
              `- Compare current -> latest: ${compareUrl}`,
              `- Parity check against latest: **${parityStatus.toUpperCase()}**`,
              `- Build with new version: **${buildStatus.toUpperCase()}**`,
              `- E2E tests against new version: **${e2eStatus.toUpperCase()}**`,
              `- Potential breaking API change detected: **${breaking.toUpperCase()}**`,
              `- Workflow run: ${runUrl}`,
              '',
              '## Upstream Release Notes',
              releaseTitle ? `Release: ${releaseTitle}` : 'Release: not found for this ref',
              releaseUrl ? `URL: ${releaseUrl}` : '',
              releaseNotes ? releaseNotes : '_No release notes found for this exact ref (likely pseudo-version); see compare summary below._',
              '',
              '## Upstream Changelog / Commit Summary',
              compareSummary ? `\`\`\`text\n${truncate(compareSummary, 4000)}\n\`\`\`` : '_Compare summary unavailable._',
              '',
              apiSummary,
              '',
              '## Parity Output',
              '```text',
              parityOutput,
              '```',
              '',
              '## E2E Test Results',
              `Status: **${e2eStatus.toUpperCase()}**`,
              '',
              '```text',
              truncate(e2eOutput, 4000),
              '```',
              '',
              'Next step: open a parity batch PR to wrap added methods and address any breaking signature changes.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              core.info(`Created issue #${created.data.number}`);
            }

      - name: No update found
        if: steps.detect.outputs.has_update != 'true'
        run: echo "No newer whatsmeow version detected."
