name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-go:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            npm-pkg: darwin-arm64
          - goos: darwin
            goarch: amd64
            npm-pkg: darwin-x64
          - goos: linux
            goarch: amd64
            npm-pkg: linux-x64
          - goos: linux
            goarch: arm64
            npm-pkg: linux-arm64
          - goos: windows
            goarch: amd64
            npm-pkg: win32-x64
          - goos: windows
            goarch: arm64
            npm-pkg: win32-arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -trimpath -ldflags="-s -w" \
            -o "npm/${{ matrix.npm-pkg }}/bin/whatsmeow-node${EXT}" \
            ./cmd/whatsmeow-node

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.npm-pkg }}
          path: npm/${{ matrix.npm-pkg }}/bin/

  # Build musl separately — uses CGO_ENABLED=0 same as others but
  # the npm package has libc: ["musl"] so Alpine npm resolves it
  build-go-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o npm/linux-x64-musl/bin/whatsmeow-node \
            ./cmd/whatsmeow-node

      - uses: actions/upload-artifact@v4
        with:
          name: binary-linux-x64-musl
          path: npm/linux-x64-musl/bin/

  publish:
    needs: [build-go, build-go-musl]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy binaries to platform packages
        run: |
          for dir in npm/*/; do
            pkg=$(basename "$dir")
            if [ -d "artifacts/binary-${pkg}" ]; then
              mkdir -p "${dir}bin"
              cp -r "artifacts/binary-${pkg}/"* "${dir}bin/"
              chmod +x "${dir}bin/"* 2>/dev/null || true
            fi
          done

      - name: Sync versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for pkg in npm/*/package.json; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              p.version = '${VERSION}';
              fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
            "
          done
          cd ts
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            for (const dep of Object.keys(p.optionalDependencies || {})) {
              p.optionalDependencies[dep] = '${VERSION}';
            }
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish platform packages
        run: |
          for dir in npm/*/; do
            pkg=$(basename "$dir")
            # Skip the shared README template
            [ ! -f "${dir}package.json" ] && continue
            cp npm/README.md LICENSE "$dir"
            echo "Publishing ${pkg}..."
            cd "$dir"
            npm publish --access public --provenance || true
            cd ../..
          done

      - name: Publish main package
        run: |
          TAG="${GITHUB_REF_NAME}"
          sed "s|(./|(https://github.com/nicastelo/whatsmeow-node/blob/${TAG}/|g" README.md > ts/README.md
          cp LICENSE ts/
          cd ts
          npm install --ignore-scripts
          npm run build
          npm publish --access public --provenance

      - name: Prepare release notes
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Check if CHANGELOG.md already has an entry for this version
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -n "$NOTES" ]; then
            echo "Found existing CHANGELOG.md entry for ${VERSION}"
            echo "$NOTES" > /tmp/release-notes.md
          else
            echo "No CHANGELOG.md entry for ${VERSION}, generating from PRs/commits..."
            # Get the previous tag
            PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
            # Generate notes via GitHub API
            GENERATED=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${GITHUB_REF_NAME}" \
              -f target_commitish=main \
              ${PREV_TAG:+-f previous_tag_name="${PREV_TAG}"} \
              --jq '.body')
            echo "$GENERATED" > /tmp/release-notes.md
            # Insert into CHANGELOG.md
            DATE=$(date +%Y-%m-%d)
            HEADER="## [${VERSION}] - ${DATE}"
            # Build the new entry
            {
              echo "${HEADER}"
              echo ""
              echo "${GENERATED}"
              echo ""
            } > /tmp/changelog-entry.md
            # Insert after the header line (line 6: after the alpha notice)
            # Find the line number of the first ## [ entry
            INSERT_LINE=$(grep -n "^## \[" CHANGELOG.md | head -1 | cut -d: -f1)
            if [ -n "$INSERT_LINE" ]; then
              {
                head -n $((INSERT_LINE - 1)) CHANGELOG.md
                cat /tmp/changelog-entry.md
                tail -n +${INSERT_LINE} CHANGELOG.md
              } > /tmp/CHANGELOG.md
            else
              {
                cat CHANGELOG.md
                echo ""
                cat /tmp/changelog-entry.md
              } > /tmp/CHANGELOG.md
            fi
            # Add compare link
            if [ -n "$PREV_TAG" ]; then
              LINK="[${VERSION}]: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${GITHUB_REF_NAME}"
              # Append before existing links or at end
              if grep -q "^\[" /tmp/CHANGELOG.md; then
                LINK_LINE=$(grep -n "^\[" /tmp/CHANGELOG.md | head -1 | cut -d: -f1)
                {
                  head -n $((LINK_LINE - 1)) /tmp/CHANGELOG.md
                  echo "$LINK"
                  tail -n +${LINK_LINE} /tmp/CHANGELOG.md
                } > /tmp/CHANGELOG2.md
                mv /tmp/CHANGELOG2.md /tmp/CHANGELOG.md
              else
                echo "$LINK" >> /tmp/CHANGELOG.md
              fi
            fi
            cp /tmp/CHANGELOG.md CHANGELOG.md
            echo "changelog_updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md

      - name: Sync versions back to main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git checkout main
          git pull --ff-only origin main
          MAIN_VERSION=$(node -p "require('./ts/package.json').version")
          if npx semver "$VERSION" -r ">=${MAIN_VERSION}"; then
            cd ts && npm version "${VERSION}" --no-git-tag-version --allow-same-version && cd ..
            node scripts/sync-versions.mjs
            git add ts/package.json npm/*/package.json
            # Also include CHANGELOG.md if it was auto-generated
            if [ "${{ steps.changelog.outputs.changelog_updated }}" = "true" ]; then
              git add CHANGELOG.md
            fi
            if git diff --cached --quiet; then
              echo "Nothing to sync"
            else
              git commit -m "Sync package versions to ${VERSION}"
              git push origin main
            fi
          else
            echo "Skipping sync: released ${VERSION} is older than main (${MAIN_VERSION})"
          fi
