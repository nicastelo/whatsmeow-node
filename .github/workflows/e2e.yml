name: E2E

on:
  schedule:
    - cron: "0 8 * * *" # Daily at 8am UTC
  workflow_dispatch: # Manual trigger
  pull_request:
    types: [labeled, synchronize]

permissions:
  actions: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'nicastelo/whatsmeow-node' &&
      (github.event_name != 'pull_request' ||
       contains(github.event.pull_request.labels.*.name, 'run-e2e'))
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Go binary
        run: go build -o whatsmeow-node ./cmd/whatsmeow-node

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd ts && npm install --ignore-scripts

      - name: Decrypt session
        env:
          E2E_SESSION_KEY: ${{ secrets.E2E_SESSION_KEY }}
        run: |
          if [ -z "$E2E_SESSION_KEY" ]; then
            echo "::error::E2E_SESSION_KEY secret not set"
            exit 1
          fi
          if [ ! -f .e2e-session.db.enc ]; then
            echo "::error::.e2e-session.db.enc not found in repo"
            exit 1
          fi
          openssl enc -aes-256-cbc -d -pbkdf2 \
            -in .e2e-session.db.enc -out ts/e2e-session.db \
            -pass "pass:$E2E_SESSION_KEY"

      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        env:
          E2E_BINARY_PATH: ${{ github.workspace }}/whatsmeow-node
          E2E_SESSION_DB: ${{ github.workspace }}/ts/e2e-session.db
        run: cd ts && npm run test:e2e

      - name: Run integration tests with coverage
        id: integration
        if: steps.e2e.outcome == 'success'
        continue-on-error: true
        env:
          WHATSMEOW_INTEGRATION: "1"
          TEST_PHONE: ${{ secrets.TEST_PHONE }}
          E2E_BINARY_PATH: ${{ github.workspace }}/whatsmeow-node
          E2E_SESSION_DB: ${{ github.workspace }}/ts/e2e-session.db
        run: cd ts && npm run test:integration:coverage

      - name: Update coverage badge
        if: steps.integration.outcome == 'success' && github.event_name != 'pull_request'
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          BADGE_JSON=$(cd ts && node scripts/coverage-badge.mjs)
          if [ -n "$GIST_TOKEN" ]; then
            curl -s -X PATCH \
              -H "Authorization: token $GIST_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/gists/deee098d298bc9a9193cec6adcb13220" \
              -d "$(jq -n --arg b "$BADGE_JSON" '{files: {"coverage-badge.json": {content: $b}}}')"
          else
            echo "::notice::Coverage badge: $BADGE_JSON (GIST_TOKEN not set, skipping badge update)"
          fi

      - name: Handle session expiry
        if: steps.e2e.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f ts/.e2e-session-expired ]; then
            echo "::warning::WhatsApp session expired. Re-pair and update .e2e-session.db.enc"
            gh run cancel ${{ github.run_id }} --repo ${{ github.repository }}
            sleep 10
          else
            echo "E2E tests failed (not a session expiry)"
            exit 1
          fi
